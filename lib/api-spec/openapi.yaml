openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: Auth
    description: Browser and mobile authentication endpoints.
  - name: Profiles
    description: Dating profile management.
  - name: Matching
    description: Feed, swiping, and matches.
  - name: Blocks
    description: Blocking and unblocking other users.
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
  /auth/user:
    get:
      tags: [Auth]
      operationId: getCurrentAuthUser
      summary: Get the currently authenticated user (JIT-provisioned from Clerk)
      responses:
        '200':
          description: Auth status resolved successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthUserEnvelope'
  /subscription/activate:
    post:
      tags: [Auth]
      operationId: activateSubscription
      summary: Mark the authenticated user as subscribed (persisted server-side, tied to their account).
      responses:
        '200':
          description: Subscription activated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthUserEnvelope'
  /storage/uploads/request-url:
    post:
      tags: [Profiles]
      operationId: requestUploadUrl
      summary: Request a presigned upload URL for a photo
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UploadUrlRequestBody'
      responses:
        '200':
          description: Presigned URL generated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UploadUrlRequestResponse'
  /profile:
    get:
      tags: [Profiles]
      operationId: getMyProfile
      summary: Get the authenticated user's own profile
      responses:
        '200':
          description: Profile found or null if not yet created.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProfileEnvelope'
        '401':
          description: Not authenticated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
    put:
      tags: [Profiles]
      operationId: upsertMyProfile
      summary: Create or update the authenticated user's profile
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpsertProfileBody'
      responses:
        '200':
          description: Profile saved.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProfileEnvelope'
        '401':
          description: Not authenticated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
  /feed:
    get:
      tags: [Matching]
      operationId: getFeed
      summary: Get real profiles to swipe on, excluding self and already-swiped
      responses:
        '200':
          description: Feed of candidate profiles.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FeedResponse'
        '401':
          description: Not authenticated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
  /swipe:
    post:
      tags: [Matching]
      operationId: createSwipe
      summary: Record a swipe on another user; creates a match if mutual
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SwipeInput'
      responses:
        '200':
          description: Swipe recorded.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SwipeResult'
        '401':
          description: Not authenticated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
  /matches:
    get:
      tags: [Matching]
      operationId: getMatches
      summary: Get the authenticated user's matches
      responses:
        '200':
          description: List of matches.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MatchesResponse'
        '401':
          description: Not authenticated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
  /blocks:
    get:
      tags: [Blocks]
      operationId: getBlocks
      summary: Get the authenticated user's blocked user IDs
      responses:
        '200':
          description: List of blocked user IDs.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BlocksResponse'
        '401':
          description: Not authenticated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
    post:
      tags: [Blocks]
      operationId: createBlock
      summary: Block another user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BlockInput'
      responses:
        '200':
          description: User blocked.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BlocksResponse'
        '401':
          description: Not authenticated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
  /blocks/{userId}:
    delete:
      tags: [Blocks]
      operationId: deleteBlock
      summary: Unblock a previously blocked user
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: User unblocked.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BlocksResponse'
        '401':
          description: Not authenticated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status
    AuthUser:
      type: object
      required: [id, email, firstName, lastName, profileImageUrl, isSubscribed]
      properties:
        id:
          type: string
        email:
          type: [string, 'null']
          format: email
        firstName:
          type: [string, 'null']
        lastName:
          type: [string, 'null']
        profileImageUrl:
          type: [string, 'null']
        isSubscribed:
          type: boolean
    AuthUserEnvelope:
      type: object
      required: [user]
      properties:
        user:
          oneOf:
            - $ref: '#/components/schemas/AuthUser'
            - type: 'null'
    ErrorEnvelope:
      type: object
      required: [error]
      properties:
        error:
          type: string
    UploadUrlRequestBody:
      type: object
      required: [fileName, contentType]
      properties:
        fileName:
          type: string
          minLength: 1
        contentType:
          type: string
          minLength: 1
    UploadUrlRequestResponse:
      type: object
      required: [uploadUrl, objectPath]
      properties:
        uploadUrl:
          type: string
        objectPath:
          type: string
    Profile:
      type: object
      required: [userId, name, age, bio, seeking, photoUrl, latitude, longitude, createdAt, updatedAt]
      properties:
        userId:
          type: string
        name:
          type: string
        age:
          type: integer
        bio:
          type: string
        seeking:
          type: string
        photoUrl:
          type: [string, 'null']
        latitude:
          type: [number, 'null']
        longitude:
          type: [number, 'null']
        distanceKm:
          description: Distance from the requesting user, in kilometers. Only present on feed and match entries when both users have a saved location.
          type: [number, 'null']
        createdAt:
          type: string
        updatedAt:
          type: string
    ProfileEnvelope:
      type: object
      required: [profile]
      properties:
        profile:
          oneOf:
            - $ref: '#/components/schemas/Profile'
            - type: 'null'
    UpsertProfileBody:
      type: object
      required: [name, age, bio, seeking, photoUrl]
      properties:
        name:
          type: string
          minLength: 1
        age:
          type: integer
          minimum: 18
        bio:
          type: string
        seeking:
          type: string
        photoUrl:
          type: [string, 'null']
        latitude:
          type: [number, 'null']
        longitude:
          type: [number, 'null']
    FeedResponse:
      type: object
      required: [profiles]
      properties:
        profiles:
          type: array
          items:
            $ref: '#/components/schemas/Profile'
    SwipeInput:
      type: object
      required: [targetUserId, direction]
      properties:
        targetUserId:
          type: string
          minLength: 1
        direction:
          type: string
          enum: [like, pass, superlike]
    SwipeResult:
      type: object
      required: [matched]
      properties:
        matched:
          type: boolean
        match:
          oneOf:
            - $ref: '#/components/schemas/Profile'
            - type: 'null'
    MatchesResponse:
      type: object
      required: [matches]
      properties:
        matches:
          type: array
          items:
            $ref: '#/components/schemas/Profile'
    BlockInput:
      type: object
      required: [targetUserId]
      properties:
        targetUserId:
          type: string
          minLength: 1
    BlocksResponse:
      type: object
      required: [blockedUserIds]
      properties:
        blockedUserIds:
          type: array
          items:
            type: string

