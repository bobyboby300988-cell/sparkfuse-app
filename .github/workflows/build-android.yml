name: Build Android APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: gradle-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Bump versionCode to 6
        run: |
          node -e "
          const fs = require('fs');
          const path = 'artifacts/mobile/app.json';
          const app = JSON.parse(fs.readFileSync(path, 'utf8'));
          app.expo.android.versionCode = 6;
          fs.writeFileSync(path, JSON.stringify(app, null, 2));
          console.log('versionCode set to 6');
          "

      - name: Expo Prebuild (generate android folder)
        working-directory: artifacts/mobile
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
          EXPO_PUBLIC_CLERK_PUBLISHABLE_KEY: pk_test_ZnJlZS1vY2Vsb3QtNzQuY2xlcmsuYWNjb3VudHMuZGV2JA
          EXPO_PUBLIC_DOMAIN: match-maker-2025ap.replit.app
          EXPO_PUBLIC_CLERK_PROXY_URL: https://match-maker-2025ap.replit.app/api/__clerk
          EXPO_UPDATES_CHANNEL: production
        run: pnpm exec expo prebuild --platform android --clean --no-install

      - name: Patch AndroidManifest and build.gradle
        working-directory: artifacts/mobile/android
        run: |
          sed -i 's/<application/<application android:largeHeap="true"/' app/src/main/AndroidManifest.xml
          cat >> app/build.gradle << 'EOF'

          android.packagingOptions {
              resources {
                  excludes += ["META-INF/versions/9/OSGI-INF/MANIFEST.MF"]
              }
          }
          EOF

      - name: Bundle JavaScript
        working-directory: artifacts/mobile
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
          EXPO_PUBLIC_CLERK_PUBLISHABLE_KEY: pk_test_ZnJlZS1vY2Vsb3QtNzQuY2xlcmsuYWNjb3VudHMuZGV2JA
          EXPO_PUBLIC_DOMAIN: match-maker-2025ap.replit.app
          EXPO_PUBLIC_CLERK_PROXY_URL: https://match-maker-2025ap.replit.app/api/__clerk
          EXPO_UPDATES_CHANNEL: production
          NODE_ENV: production
        run: |
          mkdir -p android/app/src/main/assets
          pnpm exec expo export:embed \
            --platform android \
            --bundle-output android/app/src/main/assets/index.android.bundle \
            --assets-dest android/app/src/main/res/ \
            --dev false \
            --reset-cache

      - name: Verify bundle exists
        run: |
          ls -lh artifacts/mobile/android/app/src/main/assets/
          echo "Bundle size: $(wc -c < artifacts/mobile/android/app/src/main/assets/index.android.bundle) bytes"

      - name: Build Android APK
        working-directory: artifacts/mobile/android
        env:
          GRADLE_OPTS: "-Xmx4g -XX:MaxMetaspaceSize=1g -Dorg.gradle.daemon=false"
          JAVA_OPTS: "-Xmx4g -XX:MaxMetaspaceSize=1g"
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug \
            -PreactNativeArchitectures=arm64-v8a \
            --no-daemon \
            --max-workers=2 \
            --stacktrace

      - name: Find APK
        run: find artifacts/mobile/android -name "*.apk" -exec ls -lh {} \;

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: SparkFuse
          path: artifacts/mobile/android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
