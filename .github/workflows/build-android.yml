name: Build Android APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Build workspace libs
        run: pnpm run typecheck:libs

      - name: Expo Prebuild (generate android folder)
        working-directory: artifacts/mobile
        env:
          EXPO_PUBLIC_CLERK_PUBLISHABLE_KEY: pk_test_ZnJlZS1vY2Vsb3QtNzQuY2xlcmsuYWNjb3VudHMuZGV2JA
          EXPO_PUBLIC_DOMAIN: match-maker-2025ap.replit.app
          EXPO_PUBLIC_DAILY_API_KEY: 8815fcebd27b822ff4be2e3c7b4ce019304b5d30634a27e72f4a70c1a8253d40
          EXPO_PUBLIC_CLERK_PROXY_URL: https://match-maker-2025ap.replit.app/api/__clerk
        run: pnpm exec expo prebuild --platform android --clean --no-install

      - name: Patch AndroidManifest and build.gradle
        working-directory: artifacts/mobile/android
        run: |
          sed -i 's/<application/<application android:largeHeap="true"/' app/src/main/AndroidManifest.xml
          cat >> app/build.gradle << 'EOF'

          android.packagingOptions {
              resources {
                  excludes += ["META-INF/versions/9/OSGI-INF/MANIFEST.MF"]
              }
          }
          EOF

      - name: Bundle JavaScript (embed in APK)
        working-directory: artifacts/mobile
        env:
          EXPO_PUBLIC_CLERK_PUBLISHABLE_KEY: pk_test_ZnJlZS1vY2Vsb3QtNzQuY2xlcmsuYWNjb3VudHMuZGV2JA
          EXPO_PUBLIC_DOMAIN: match-maker-2025ap.replit.app
          EXPO_PUBLIC_DAILY_API_KEY: 8815fcebd27b822ff4be2e3c7b4ce019304b5d30634a27e72f4a70c1a8253d40
          EXPO_PUBLIC_CLERK_PROXY_URL: https://match-maker-2025ap.replit.app/api/__clerk
          NODE_ENV: production
        run: |
          mkdir -p android/app/src/main/assets
          pnpm exec react-native bundle \
            --platform android \
            --dev false \
            --entry-file node_modules/expo-router/entry.js \
            --bundle-output android/app/src/main/assets/index.android.bundle \
            --assets-dest android/app/src/main/res/ \
            --reset-cache

      - name: Verify bundle exists
        run: |
          ls -lh artifacts/mobile/android/app/src/main/assets/
          echo "Bundle size: $(wc -c < artifacts/mobile/android/app/src/main/assets/index.android.bundle) bytes"

      - name: Build Android APK
        working-directory: artifacts/mobile/android
        env:
          GRADLE_OPTS: "-Xmx4g -XX:MaxMetaspaceSize=1g"
          JAVA_OPTS: "-Xmx4g -XX:MaxMetaspaceSize=1g"
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug \
            -PreactNativeArchitectures=arm64-v8a \
            --no-daemon \
            --stacktrace

      - name: Rename APK
        run: cp artifacts/mobile/android/app/build/outputs/apk/debug/app-debug.apk SparkFuse.apk

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: SparkFuse
          path: SparkFuse.apk
          retention-days: 30
